---
# group_vars/all.yml — variables shared across all Hearth hosts
#
# Values here mirror the structure of hearth.yaml so playbook tasks and Jinja2
# templates can reference them directly. Override per-host in host_vars/ as needed.
#
# The nested `box`, `wifi`, and `services` mappings match the hearth.yaml top-level
# structure so that role templates work identically whether rendered by
# scripts/generate-configs.py (from hearth.yaml directly) or by the Ansible
# template module (from these group variables).

# ---------------------------------------------------------------------------
# Box identity (mirrors hearth.yaml: box.*)
# ---------------------------------------------------------------------------
box:
  name:   "Hearth"
  domain: "hearth.local"
  ip:     "10.0.0.1"

# ---------------------------------------------------------------------------
# WiFi hotspot (mirrors hearth.yaml: wifi.*)
# ---------------------------------------------------------------------------
wifi:
  ssid:             "Hearth"
  passphrase:       ""
  interface:        "wlan0"
  channel:          6
  dhcp_range_start: "10.0.0.10"
  dhcp_range_end:   "10.0.0.200"
  dhcp_lease:       "12h"

# ---------------------------------------------------------------------------
# Storage (mirrors hearth.yaml: storage.*)
# ---------------------------------------------------------------------------
storage:
  base: "/srv/hearth"
  locations:
    calibre_web: "/srv/hearth/calibre"
    kiwix:       "/srv/hearth/kiwix"
    navidrome:   "/srv/hearth/navidrome"

# ---------------------------------------------------------------------------
# Kiwix offline content (mirrors hearth.yaml: kiwix.*)
# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# Services — per-service enable flags (mirrors hearth.yaml: services.*)
# ---------------------------------------------------------------------------
services:
  chat:
    enabled: true
  calibre_web:
    enabled: true
  kiwix:
    enabled: true
    download_zims: false
    content:
      - name: "wikipedia_en_ray-charles_mini_2025-11.zim"
        url: "https://download.kiwix.org/zim/wikipedia/wikipedia_en_ray-charles_mini_2025-11.zim"
        enabled: true
      - name: "libretexts.org_en_k12_2026-01.zim"
        url: "https://download.kiwix.org/zim/libretexts/libretexts.org_en_k12_2026-01.zim"
        enabled: true
  navidrome:
    enabled: true

# ---------------------------------------------------------------------------
# USB SSH — cable-based operator access via USB OTG (mirrors hearth.yaml: usb_ssh.*)
# ---------------------------------------------------------------------------
usb_ssh:
  enabled: true
  username: "cafe"
  password: "cafe"
  ip: "192.168.7.2"

# ---------------------------------------------------------------------------
# Diagnostics (mirrors hearth.yaml: diagnostics.*)
# ---------------------------------------------------------------------------
diagnostics:
  redact_secrets: false

# ---------------------------------------------------------------------------
# Flat hearth_* aliases (kept for backward compatibility with tasks that
# reference individual variables directly)
# ---------------------------------------------------------------------------
hearth_name:         "{{ box.name }}"
hearth_domain:       "{{ box.domain }}"
hearth_ip:           "{{ box.ip }}"
hearth_storage_base: "{{ storage.base }}"
