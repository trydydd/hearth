---
# roles/kiwix/defaults/main.yml

# ---- kiwix-serve binary -----------------------------------------------------
kiwix_version: "3.8.2"

kiwix_port: 8888
kiwix_storage: "/srv/hearth/kiwix"

# Local directories on the build machine used to stage files before copying
# into the image. Both are gitignored. Override if your build system uses a
# different cache location.
kiwix_local_build_cache: "{{ playbook_dir }}/../.build-cache/kiwix"
kiwix_local_zim_cache:   "{{ playbook_dir }}/../zims"

# ZIM files are injected onto the SD card after flashing via scripts/inject-zims.sh.
# The image build never downloads ZIMs. Set to true only if you want Ansible to
# also copy ZIMs during provisioning (e.g. a self-hosted build with local cache).
kiwix_download_zims: false

# ---- ZIM content library ----------------------------------------------------
#
# Each entry describes a ZIM file to download and serve.
#
#   name    — filename on disk under kiwix_storage/; must end in .zim
#   url     — download URL (Kiwix mirrors: https://library.kiwix.org/)
#   enabled — false skips the download; does not delete an existing file
#
# To swap content:
#   1. Set the old entry to enabled: false (or remove it).
#   2. Manually delete the old .zim from /srv/hearth/kiwix/ on the device.
#   3. Add a new entry and re-provision.
#
# Browse available ZIM files: https://library.kiwix.org/
#
kiwix_zims:
  - name: "wikipedia_en_ray-charles_mini_2025-11.zim"
    url: "https://download.kiwix.org/zim/wikipedia/wikipedia_en_ray-charles_mini_2025-11.zim"
    enabled: true
