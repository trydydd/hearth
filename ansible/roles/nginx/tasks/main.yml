---
# roles/nginx/tasks/main.yml — Install and configure nginx as the Hearth portal.
#
# Task 0.11: Deploy the Jinja2-rendered nginx configuration that:
#   - Serves the portal landing page on port 80.
#   - Provides stub reverse-proxy location blocks for each service.
# Task 0.12: Deploy the portal landing page (files/index.html) to the web root.

- name: "nginx — install and configure"
  block:
    - name: Install nginx package
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Enable nginx service
      ansible.builtin.service:
        name: nginx
        enabled: true

    - name: Start nginx service (live system only)
      ansible.builtin.service:
        name: nginx
        state: started
      when: _systemd_active.stat.exists

    - name: Create portal web root directory
      ansible.builtin.file:
        path: "{{ nginx_portal_root }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Deploy portal landing page
      ansible.builtin.copy:
        src: index.html
        dest: "{{ nginx_portal_root }}/index.html"
        owner: www-data
        group: www-data
        mode: "0644"

    - name: Deploy Hearth shared stylesheet
      ansible.builtin.copy:
        src: hearth.css
        dest: "{{ nginx_portal_root }}/hearth.css"
        owner: www-data
        group: www-data
        mode: "0644"

    - name: Deploy rendered nginx configuration to sites-available
      ansible.builtin.template:
        src: nginx.conf.j2
        dest: "{{ nginx_conf_dest }}"
        owner: root
        group: root
        mode: "0644"
      notify: Reload nginx

    - name: Enable hearth nginx site (symlink into sites-enabled)
      ansible.builtin.file:
        src: "{{ nginx_conf_dest }}"
        dest: "{{ nginx_conf_enabled }}"
        state: link
      notify: Reload nginx

    - name: Remove default nginx site from sites-enabled
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

  rescue:
    - name: "nginx FAILED — installation or configuration error"
      ansible.builtin.fail:
        msg: >-
          nginx role failed.
          Check the task output above for details.
