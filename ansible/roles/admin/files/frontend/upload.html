<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hearth — Upload Content</title>
  <link rel="stylesheet" href="/hearth.css" />
</head>
<body>
  <div class="page">
    <header class="header" role="banner">
      <h1>Upload Content</h1>
      <a class="back-link" href="/admin/dashboard.html">&#8592; Dashboard</a>
    </header>

    <div class="upload-grid" id="upload-grid">

      <!-- Kiwix ZIM files -->
      <section class="upload-card" aria-labelledby="kiwix-heading">
        <h2 id="kiwix-heading">Kiwix</h2>
        <p class="hint">Accepted: .zim</p>
        <form class="upload-form" data-service="kiwix" novalidate>
          <div class="file-input-wrapper">
            <label class="file-label" for="file-kiwix">ZIM file</label>
            <input type="file" id="file-kiwix" name="file" accept=".zim" required />
          </div>
          <button type="submit" class="btn-upload">Upload</button>
          <div class="progress-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100">
            <progress value="0" max="100"></progress>
          </div>
          <p class="status-msg" aria-live="polite"></p>
        </form>
      </section>

      <!-- Calibre / eBooks -->
      <section class="upload-card" aria-labelledby="calibre-heading">
        <h2 id="calibre-heading">Calibre</h2>
        <p class="hint">Accepted: .epub .pdf .mobi .azw .azw3 .cbz .cbr .txt</p>
        <form class="upload-form" data-service="calibre_web" novalidate>
          <div class="file-input-wrapper">
            <label class="file-label" for="file-calibre">Book file</label>
            <input type="file" id="file-calibre" name="file"
              accept=".epub,.pdf,.mobi,.azw,.azw3,.cbz,.cbr,.txt" required />
          </div>
          <button type="submit" class="btn-upload">Upload</button>
          <div class="progress-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100">
            <progress value="0" max="100"></progress>
          </div>
          <p class="status-msg" aria-live="polite"></p>
        </form>
      </section>

      <!-- Music / Jukebox -->
      <section class="upload-card" aria-labelledby="music-heading">
        <h2 id="music-heading">Music</h2>
        <p class="hint">Accepted: .mp3 .flac .ogg .m4a .wav .aac</p>
        <form class="upload-form" data-service="music" novalidate>
          <div class="file-input-wrapper">
            <label class="file-label" for="file-music">Music file</label>
            <input type="file" id="file-music" name="file"
              accept=".mp3,.flac,.ogg,.m4a,.wav,.aac" required />
          </div>
          <button type="submit" class="btn-upload">Upload</button>
          <div class="progress-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100">
            <progress value="0" max="100"></progress>
          </div>
          <p class="status-msg" aria-live="polite"></p>
        </form>
      </section>

    </div>
  </div>

  <script>
    (function () {
      "use strict";

      function getCsrfToken() {
        var match = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
        return match ? decodeURIComponent(match[1]) : "";
      }

      function setupForm(form) {
        var serviceId    = form.dataset.service;
        var fileInput    = form.querySelector("input[type='file']");
        var submitBtn    = form.querySelector("button[type='submit']");
        var progressWrap = form.querySelector(".progress-wrap");
        var progressBar  = form.querySelector("progress");
        var statusMsg    = form.querySelector(".status-msg");

        form.addEventListener("submit", function (e) {
          e.preventDefault();

          if (!fileInput.files || fileInput.files.length === 0) {
            statusMsg.textContent = "Please select a file.";
            statusMsg.className = "status-msg status-msg--error";
            return;
          }

          var file = fileInput.files[0];
          var formData = new FormData();
          formData.append("file", file);

          statusMsg.textContent = "";
          statusMsg.className = "status-msg";
          progressWrap.classList.add("visible");
          progressBar.value = 0;
          submitBtn.disabled = true;
          submitBtn.textContent = "Uploading…";

          var xhr = new XMLHttpRequest();
          xhr.open("POST", "/api/admin/upload/" + serviceId);
          xhr.setRequestHeader("X-CSRF-Token", getCsrfToken());
          xhr.withCredentials = true;

          xhr.upload.addEventListener("progress", function (ev) {
            if (ev.lengthComputable) {
              var pct = Math.round((ev.loaded / ev.total) * 100);
              progressBar.value = pct;
              progressWrap.setAttribute("aria-valuenow", pct);
            }
          });

          xhr.addEventListener("load", function () {
            submitBtn.disabled = false;
            submitBtn.textContent = "Upload";
            if (xhr.status >= 200 && xhr.status < 300) {
              progressBar.value = 100;
              statusMsg.textContent = "Upload complete: " + file.name;
              statusMsg.className = "status-msg status-msg--ok";
              form.reset();
            } else {
              var detail = "Upload failed";
              try { detail = JSON.parse(xhr.responseText).detail || detail; } catch (_) {}
              statusMsg.textContent = detail;
              statusMsg.className = "status-msg status-msg--error";
              progressWrap.classList.remove("visible");
            }
          });

          xhr.addEventListener("error", function () {
            submitBtn.disabled = false;
            submitBtn.textContent = "Upload";
            statusMsg.textContent = "Network error — please try again.";
            statusMsg.className = "status-msg status-msg--error";
            progressWrap.classList.remove("visible");
          });

          xhr.send(formData);
        });
      }

      document.querySelectorAll(".upload-form").forEach(setupForm);
    })();
  </script>
</body>
</html>
