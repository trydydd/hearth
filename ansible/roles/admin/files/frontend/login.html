<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CafeBox — Sign In</title>
  <style>
    /* Design tokens — matches STYLEGUIDE.md §4 */
    :root {
      --bg-sky-top: #84c8ff;
      --bg-sky-bottom: #dff3ff;
      --surface-1: #f6f1da;
      --surface-2: #ece3c5;
      --surface-3: #d7c79a;
      --ink-strong: #1d2433;
      --ink-soft: #36445e;
      --ink-inverse: #fffdf2;
      --accent-primary: #e85d44;
      --accent-primary-hover: #c94c33;
      --accent-danger: #c92a2a;
      --border-strong: #1d2433;
      --shadow-pixel: 4px 4px 0 #1d2433;
      --focus-ring: #2e7dff;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 24px;
      --space-6: 32px;
      --radius-sm: 4px;
      --radius-md: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Verdana, Tahoma, sans-serif;
      font-size: 16px;
      background: linear-gradient(180deg, var(--bg-sky-top) 0%, var(--bg-sky-bottom) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-strong);
    }

    .card {
      background: var(--surface-1);
      border: 3px solid var(--border-strong);
      box-shadow: var(--shadow-pixel);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      width: 100%;
      max-width: 380px;
      margin: var(--space-4);
    }

    h1 {
      font-size: 22px;
      margin-bottom: var(--space-5);
      text-align: center;
    }

    .form-group {
      margin-bottom: var(--space-4);
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: var(--space-2);
      color: var(--ink-soft);
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      border: 2px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: #fff;
      font-family: inherit;
      font-size: 16px;
      color: var(--ink-strong);
    }

    input:focus {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .btn-primary {
      display: block;
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background: var(--accent-primary);
      color: var(--ink-inverse);
      border: 2px solid var(--border-strong);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-pixel);
      font-family: inherit;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: var(--space-5);
      transition: background 120ms;
      min-height: 44px;
    }

    .btn-primary:hover { background: var(--accent-primary-hover); }
    .btn-primary:focus-visible { outline: 3px solid var(--focus-ring); outline-offset: 2px; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    @media (prefers-reduced-motion: reduce) {
      .btn-primary { transition: none; }
    }

    .error-msg {
      background: #fff0f0;
      border: 2px solid var(--accent-danger);
      border-radius: var(--radius-sm);
      padding: var(--space-3) var(--space-4);
      color: var(--accent-danger);
      font-size: 14px;
      margin-top: var(--space-4);
      display: none;
    }

    .error-msg[aria-live] { display: block; }

    .first-boot-banner {
      background: #fffbe6;
      border: 2px solid #d97706;
      border-radius: var(--radius-sm);
      padding: var(--space-3) var(--space-4);
      font-size: 14px;
      margin-bottom: var(--space-4);
      display: none;
    }

    .first-boot-banner strong { display: block; margin-bottom: var(--space-2); }

    .initial-password {
      font-family: monospace;
      font-size: 18px;
      letter-spacing: 0.05em;
      background: var(--surface-2);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: var(--space-2) var(--space-3);
      display: inline-block;
      margin-top: var(--space-2);
    }

    #change-password-panel { display: none; }
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1>CafeBox Admin</h1>

    <!-- Shown on first boot before login -->
    <div class="first-boot-banner" id="first-boot-banner" aria-live="polite">
      <strong>First boot — set a new password after signing in.</strong>
      Your temporary password is:
      <span class="initial-password" id="initial-password-display"></span>
    </div>

    <!-- Login form -->
    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          autocomplete="username"
          required
          value="cafebox-admin"
        />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit" class="btn-primary" id="submit-btn">Sign in</button>
    </form>
    <p class="error-msg" id="error-msg" role="alert"></p>

    <!-- Change-password panel — revealed after first-boot login -->
    <form id="change-password-panel" novalidate>
      <h2 style="font-size:18px;margin-bottom:var(--space-4);">Set a new password</h2>
      <div class="form-group">
        <label for="current-password">Current (temporary) password</label>
        <input
          type="password"
          id="current-password"
          name="current-password"
          autocomplete="current-password"
          required
        />
      </div>
      <div class="form-group">
        <label for="new-password">New password (min. 12 characters)</label>
        <input
          type="password"
          id="new-password"
          name="new-password"
          autocomplete="new-password"
          required
        />
      </div>
      <button type="submit" class="btn-primary" id="change-btn">Set password</button>
      <p class="error-msg" id="change-error-msg" role="alert"></p>
    </form>
  </main>

  <script>
    (function () {
      "use strict";

      var isFirstBoot = false;
      var initialPassword = "";

      function getCsrfToken() {
        var match = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
        return match ? decodeURIComponent(match[1]) : "";
      }

      /* ---------------------------------------------------------------- */
      /* First-boot detection                                              */
      /* ---------------------------------------------------------------- */
      function checkFirstBoot(cb) {
        fetch("/api/public/services/status", { credentials: "same-origin" })
          .then(function (res) { return res.ok ? res.json() : {}; })
          .then(function (data) {
            if (data.first_boot) {
              isFirstBoot = true;
              initialPassword = data.initial_password || "";
              var banner = document.getElementById("first-boot-banner");
              document.getElementById("initial-password-display").textContent = initialPassword;
              banner.style.display = "block";
              /* Pre-fill the password field with the temporary password */
              document.getElementById("password").value = initialPassword;
            }
          })
          .catch(function () { /* non-fatal */ })
          .finally(cb);
      }

      /* ---------------------------------------------------------------- */
      /* Change-password panel (shown after first-boot login)             */
      /* ---------------------------------------------------------------- */
      function showChangePanel() {
        document.getElementById("login-form").style.display = "none";
        document.getElementById("first-boot-banner").style.display = "none";
        var panel = document.getElementById("change-password-panel");
        panel.style.display = "block";
        document.getElementById("current-password").value = initialPassword;
        document.getElementById("new-password").focus();

        var changeBtn = document.getElementById("change-btn");
        var changeErr = document.getElementById("change-error-msg");

        panel.addEventListener("submit", function (e) {
          e.preventDefault();
          var currentPw = document.getElementById("current-password").value;
          var newPw = document.getElementById("new-password").value;

          changeErr.textContent = "";
          changeErr.removeAttribute("aria-live");
          changeBtn.disabled = true;
          changeBtn.textContent = "Saving…";

          fetch("/api/admin/auth/change-password", {
            method: "POST",
            credentials: "same-origin",
            headers: {
              "Content-Type": "application/json",
              "X-CSRF-Token": getCsrfToken()
            },
            body: JSON.stringify({ current_password: currentPw, new_password: newPw })
          })
            .then(function (res) {
              if (res.ok) {
                window.location.href = "/admin/dashboard.html";
              } else {
                return res.json().then(function (data) {
                  changeErr.textContent = data.detail || "Could not change password. Please try again.";
                  changeErr.setAttribute("aria-live", "assertive");
                });
              }
            })
            .catch(function () {
              changeErr.textContent = "Network error. Please try again.";
              changeErr.setAttribute("aria-live", "assertive");
            })
            .finally(function () {
              changeBtn.disabled = false;
              changeBtn.textContent = "Set password";
            });
        });
      }

      /* ---------------------------------------------------------------- */
      /* Login form                                                        */
      /* ---------------------------------------------------------------- */
      function attachSubmit() {
        var form = document.getElementById("login-form");
        var submitBtn = document.getElementById("submit-btn");
        var errorMsg = document.getElementById("error-msg");

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          var username = document.getElementById("username").value.trim();
          var password = document.getElementById("password").value;

          errorMsg.textContent = "";
          errorMsg.removeAttribute("aria-live");
          submitBtn.disabled = true;
          submitBtn.textContent = "Signing in…";

          fetch("/api/admin/login", {
            method: "POST",
            credentials: "same-origin",
            headers: {
              "Content-Type": "application/json",
              "X-CSRF-Token": getCsrfToken()
            },
            body: JSON.stringify({ username: username, password: password })
          })
            .then(function (res) {
              if (res.ok) {
                if (isFirstBoot) {
                  showChangePanel();
                } else {
                  window.location.href = "/admin/dashboard.html";
                }
              } else {
                return res.json().then(function (data) {
                  errorMsg.textContent = data.detail || "Sign in failed. Please try again.";
                  errorMsg.setAttribute("aria-live", "assertive");
                });
              }
            })
            .catch(function () {
              errorMsg.textContent = "Network error. Please try again.";
              errorMsg.setAttribute("aria-live", "assertive");
            })
            .finally(function () {
              submitBtn.disabled = false;
              submitBtn.textContent = "Sign in";
            });
        });
      }

      /* Seed CSRF cookie, then check first-boot state, then wire up form */
      function init() {
        fetch("/healthz", { credentials: "same-origin" })
          .finally(function () {
            checkFirstBoot(attachSubmit);
          });
      }

      init();
    })();
  </script>
</body>
</html>
