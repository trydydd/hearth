<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hearth — Dashboard</title>
  <link rel="stylesheet" href="/hearth.css" />
</head>
<body>
  <div class="page">
    <header class="header" role="banner">
      <h1>Hearth Admin</h1>
      <nav aria-label="Admin navigation" style="display:flex;gap:var(--space-3);align-items:center;">
        <a class="upload-link" href="/admin/upload.html">Upload Content</a>
        <button class="btn-logout" id="logout-btn" type="button">Sign out</button>
      </nav>
    </header>

    <section class="services-section" aria-labelledby="services-heading">
      <h2 id="services-heading">Services</h2>
      <div class="tile-grid" id="tile-grid" aria-live="polite" aria-label="Services"></div>
    </section>
  </div>

  <div class="notification" id="notification" role="status" aria-live="polite"></div>

  <script>
    (function () {
      "use strict";

      var tileGrid     = document.getElementById("tile-grid");
      var notification = document.getElementById("notification");
      var logoutBtn    = document.getElementById("logout-btn");
      var _notifyTimer = null;

      function getCsrfToken() {
        var match = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
        return match ? decodeURIComponent(match[1]) : "";
      }

      function showNotice(msg) {
        clearTimeout(_notifyTimer);
        notification.textContent = msg;
        notification.classList.add("notification--visible");
        _notifyTimer = setTimeout(function () {
          notification.classList.remove("notification--visible");
        }, 3000);
      }

      function runAction(serviceId, action, btns) {
        btns.forEach(function (b) { b.disabled = true; });

        fetch("/api/admin/services/" + serviceId + "/" + action, {
          method: "POST",
          credentials: "same-origin",
          headers: { "X-CSRF-Token": getCsrfToken() }
        })
          .then(function (res) {
            if (res.ok) {
              showNotice(serviceId + " " + action + "ed");
              setTimeout(fetchAndRender, 800);
            } else {
              return res.json().then(function (d) {
                showNotice("Error: " + (d.detail || action + " failed"));
              });
            }
          })
          .catch(function () {
            showNotice("Network error — could not " + action + " " + serviceId);
          })
          .finally(function () {
            btns.forEach(function (b) { b.disabled = false; });
          });
      }

      function buildTile(svc) {
        var enabled = !!svc.enabled;
        var article = document.createElement("article");
        article.className = "tile tile--static " + (enabled ? "tile--enabled" : "tile--disabled");
        article.dataset.serviceId = svc.id;

        var nameEl = document.createElement("p");
        nameEl.className = "tile-name";
        nameEl.textContent = svc.name || svc.id;

        var badges = document.createElement("div");
        badges.className = "tile-badges";

        var enabledBadge = document.createElement("span");
        enabledBadge.className = "badge " + (enabled ? "badge--enabled" : "badge--disabled");
        enabledBadge.textContent = enabled ? "Enabled" : "Disabled";
        badges.appendChild(enabledBadge);

        if (enabled) {
          var runningBadge = document.createElement("span");
          runningBadge.className = "badge " + (svc.running ? "badge--running" : "badge--stopped");
          runningBadge.textContent = svc.running ? "Running" : "Stopped";
          badges.appendChild(runningBadge);
        }

        article.appendChild(nameEl);
        article.appendChild(badges);

        if (enabled) {
          var actions = document.createElement("div");
          actions.className = "tile-actions";

          var btns = [];

          [
            { label: "Start",   cls: "btn-start",   action: "start"   },
            { label: "Stop",    cls: "btn-stop",     action: "stop"    },
            { label: "Restart", cls: "btn-restart",  action: "restart" }
          ].forEach(function (def) {
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "btn-action " + def.cls;
            btn.textContent = def.label;
            btn.setAttribute("aria-label", def.label + " " + (svc.name || svc.id));
            btn.addEventListener("click", function () {
              runAction(svc.id, def.action, btns);
            });
            btns.push(btn);
            actions.appendChild(btn);
          });

          article.appendChild(actions);
        }

        return article;
      }

      function fetchAndRender() {
        fetch("/api/admin/services/status", { credentials: "same-origin" })
          .then(function (res) {
            if (res.status === 401) { window.location.href = "/admin/login.html"; return; }
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.json();
          })
          .then(function (data) {
            var services = Array.isArray(data.services) ? data.services : [];
            tileGrid.innerHTML = "";
            if (services.length === 0) {
              var msg = document.createElement("p");
              msg.textContent = "No services are enabled yet.";
              tileGrid.appendChild(msg);
              return;
            }
            services.forEach(function (svc) { tileGrid.appendChild(buildTile(svc)); });
          })
          .catch(function () {
            tileGrid.innerHTML = "<p>Service list unavailable. <button type=\"button\" id=\"retry-btn\">Retry</button></p>";
            document.getElementById("retry-btn").addEventListener("click", fetchAndRender);
          });
      }

      logoutBtn.addEventListener("click", function () {
        logoutBtn.disabled = true;
        fetch("/api/admin/logout", {
          method: "POST",
          credentials: "same-origin",
          headers: { "X-CSRF-Token": getCsrfToken() }
        })
          .then(function () { window.location.href = "/admin/login.html"; })
          .catch(function () {
            logoutBtn.disabled = false;
            showNotice("Logout failed — please try again.");
          });
      });

      fetchAndRender();
    })();
  </script>
</body>
</html>
