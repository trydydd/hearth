---
# roles/admin/tasks/main.yml — Hearth admin backend provisioning

# -----------------------------------------------------------------------
# Task 1.05 — hearth-admin system user + sudoers
# -----------------------------------------------------------------------

- name: Create hearth-admin system user
  ansible.builtin.user:
    name: hearth-admin
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    comment: "Hearth admin backend service account"

- name: Install hearth sudoers file
  ansible.builtin.template:
    src: sudoers-hearth.j2
    dest: /etc/sudoers.d/hearth
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -c -f %s"

# -----------------------------------------------------------------------
# Python runtime prerequisites (role-local for portability)
# -----------------------------------------------------------------------

- name: Install admin backend Python runtime packages
  ansible.builtin.apt:
    name:
      - python3-packaging
      - python3-venv
    state: present
    update_cache: true
    cache_valid_time: 3600

# -----------------------------------------------------------------------
# Runtime config directory, secret key env file, and hearth.yaml copy
# -----------------------------------------------------------------------

- name: Create /etc/hearth directory
  ansible.builtin.file:
    path: /etc/hearth
    state: directory
    owner: root
    group: hearth-admin
    mode: "0750"

- name: Deploy hearth.yaml to /etc/hearth/hearth.yaml
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../hearth.yaml"
    dest: /etc/hearth/hearth.yaml
    owner: root
    group: hearth-admin
    mode: "0640"

- name: Generate admin backend environment file (first run only)
  ansible.builtin.shell:
    cmd: >-
      printf 'HEARTH_SECRET_KEY=%s\nHEARTH_CONFIG=/etc/hearth/hearth.yaml\n'
      "$(openssl rand -hex 32)" > /etc/hearth/admin.env
    creates: /etc/hearth/admin.env
  no_log: true

- name: Secure admin backend environment file
  ansible.builtin.file:
    path: /etc/hearth/admin.env
    owner: root
    group: hearth-admin
    mode: "0640"

# -----------------------------------------------------------------------
# Backend source files and Python virtualenv
# -----------------------------------------------------------------------

- name: Create admin backend source directory
  ansible.builtin.file:
    path: /opt/hearth/admin/backend
    state: directory
    owner: root
    group: hearth-admin
    mode: "0755"

- name: Deploy admin backend source files
  ansible.builtin.copy:
    src: backend/
    dest: /opt/hearth/admin/backend/
    owner: root
    group: hearth-admin
    mode: "0644"
  notify: Restart hearth-admin-backend

- name: Create Python virtualenv for admin backend
  ansible.builtin.command:
    cmd: python3 -m venv /opt/hearth/admin/venv
    creates: /opt/hearth/admin/venv/pyvenv.cfg

- name: Install admin backend Python dependencies
  ansible.builtin.pip:
    requirements: /opt/hearth/admin/backend/requirements.txt
    virtualenv: /opt/hearth/admin/venv
  notify: Restart hearth-admin-backend

# -----------------------------------------------------------------------
# Systemd service
# -----------------------------------------------------------------------

- name: Deploy hearth-admin-backend systemd service unit
  ansible.builtin.template:
    src: hearth-admin.service.j2
    dest: /etc/systemd/system/hearth-admin-backend.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart hearth-admin-backend

- name: Enable hearth-admin-backend service
  ansible.builtin.systemd:
    name: hearth-admin-backend.service
    enabled: true
    daemon_reload: true
  when: _systemd_active.stat.exists

- name: Start hearth-admin-backend service (live system only)
  ansible.builtin.service:
    name: hearth-admin-backend.service
    state: started
  when: _systemd_active.stat.exists

# -----------------------------------------------------------------------
# Admin frontend static files
# -----------------------------------------------------------------------

- name: Create admin frontend web root
  ansible.builtin.file:
    path: /var/www/hearth/admin
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Deploy admin frontend HTML files
  ansible.builtin.copy:
    src: frontend/
    dest: /var/www/hearth/admin/
    owner: www-data
    group: www-data
    mode: "0644"
