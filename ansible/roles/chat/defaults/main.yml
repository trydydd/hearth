---
# roles/chat/defaults/main.yml

# Path to the sparse backing file for the encrypted chat volume
chat_backing_file: "/srv/cafebox/chat.img"

# Size of the backing file in MB (sparse — real disk cost is negligible until used)
chat_volume_size_mb: 256

# dm-crypt device mapping name
chat_mapping: "chat-volume"

# Mount point for the encrypted volume
chat_mount: "/srv/cafebox/chat-data"

# Port the chat WebSocket server listens on (localhost only; nginx proxies /chat/ws)
chat_port: 8765

# Installation paths
chat_server_dir: "/opt/hearth/chat/server"
chat_venv_dir: "/opt/hearth/venv"
chat_frontend_dir: "/var/www/hearth/chat"
chat_lib_dir: "/usr/local/lib/hearth"
