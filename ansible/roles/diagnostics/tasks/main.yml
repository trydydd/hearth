---
# roles/diagnostics/tasks/main.yml
# Deploy diagnostic scripts into {{ diagnostics_dir }} on the target host.
#
# Two deployment tiers:
#
#   1. Boot-partition diagnostic dump (ALWAYS deployed)
#      Writes a comprehensive report to the FAT32 boot partition on every boot
#      so it can be read by pulling the SD card — the only debugging access when
#      WiFi, USB-OTG SSH, and serial are all unavailable.
#
#   2. Interactive diagnostic scripts (gated by diagnostics_enabled)
#      diagnose-wifi.sh and diagnose-first-boot.sh — interactive tools for use
#      over SSH.  Deployed in development (Vagrantfile extra_vars) or on demand:
#        ansible-playbook -i inventory/production site.yml -e diagnostics_enabled=true

# ---------------------------------------------------------------------------
# Tier 1 — Boot-partition diagnostic dump (always deployed)
# ---------------------------------------------------------------------------
- name: "diagnostics — deploy boot-partition diagnostic dump"
  block:
    - name: Create diagnostics directory
      ansible.builtin.file:
        path: "{{ diagnostics_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy diagnose-boot-dump.sh
      ansible.builtin.copy:
        src: diagnose-boot-dump.sh
        dest: "{{ diagnostics_dir }}/diagnose-boot-dump.sh"
        owner: root
        group: root
        mode: "0755"

    - name: Deploy cafebox-boot-dump systemd unit
      ansible.builtin.template:
        src: cafebox-boot-dump.service.j2
        dest: /etc/systemd/system/cafebox-boot-dump.service
        owner: root
        group: root
        mode: "0644"

    - name: Detect whether systemd is active (not a chroot / nspawn image build)
      # /run/systemd/private is only created when systemd is actually running
      # as PID 1.  /run/systemd/system exists in systemd-nspawn containers
      # even without --boot, so it is NOT a reliable indicator of a live system.
      ansible.builtin.stat:
        path: /run/systemd/private
      register: _systemd_active

    - name: Enable cafebox-boot-dump service (symlink — works in chroot and on live systems)
      ansible.builtin.file:
        src: /etc/systemd/system/cafebox-boot-dump.service
        dest: /etc/systemd/system/multi-user.target.wants/cafebox-boot-dump.service
        state: link

    - name: Reload systemd daemon (live system only — skipped during image build)
      ansible.builtin.systemd:
        name: cafebox-boot-dump.service
        daemon_reload: true
      when: _systemd_active.stat.exists

  rescue:
    - name: "diagnostics (boot dump) FAILED — deployment error"
      ansible.builtin.fail:
        msg: >-
          Boot-partition diagnostic dump deployment failed.
          Check the task output above for details.

# ---------------------------------------------------------------------------
# Tier 2 — Interactive diagnostic scripts (gated by diagnostics_enabled)
# ---------------------------------------------------------------------------
- name: "diagnostics — deploy interactive diagnostic scripts"
  when: diagnostics_enabled | bool
  block:
    - name: Deploy diagnose-first-boot.sh
      ansible.builtin.copy:
        src: diagnose-first-boot.sh
        dest: "{{ diagnostics_dir }}/diagnose-first-boot.sh"
        owner: root
        group: root
        mode: "0755"

    - name: Deploy diagnose-wifi.sh
      ansible.builtin.copy:
        src: diagnose-wifi.sh
        dest: "{{ diagnostics_dir }}/diagnose-wifi.sh"
        owner: root
        group: root
        mode: "0755"

  rescue:
    - name: "diagnostics (interactive) FAILED — script deployment error"
      ansible.builtin.fail:
        msg: >-
          Interactive diagnostic script deployment failed.
          Check the task output above for details.
