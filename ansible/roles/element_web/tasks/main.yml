---
# roles/element_web/tasks/main.yml — Install and configure Element Web client

- name: Create Element Web install directory
  ansible.builtin.file:
    path: "{{ element_web_install_dir }}"
    state: directory
    owner: root
    group: www-data
    mode: "0755"

- name: Check if Element Web is already installed
  ansible.builtin.stat:
    path: "{{ element_web_install_dir }}/index.html"
  register: _ew_installed

# The GitHub releases API resolves the latest version at provision time.
# The download block is skipped on subsequent runs when index.html is present.
# To upgrade Element Web: delete {{ element_web_install_dir }} and reprovision.
- name: Fetch latest Element Web release metadata
  ansible.builtin.uri:
    url: "https://api.github.com/repos/element-hq/element-web/releases/latest"
    headers:
      Accept: "application/vnd.github+json"
    return_content: true
  register: _ew_release
  when: not _ew_installed.stat.exists

- name: Create Element Web download workspace
  ansible.builtin.tempfile:
    state: directory
    suffix: element_web
  register: _ew_tmp
  when: not _ew_installed.stat.exists

- name: Download Element Web tarball ({{ _ew_release.json.tag_name | default('already installed') }})
  ansible.builtin.get_url:
    url: "https://github.com/element-hq/element-web/releases/download/\
          {{ _ew_release.json.tag_name }}/element-{{ _ew_release.json.tag_name }}.tar.gz"
    dest: "{{ _ew_tmp.path }}/element-web.tar.gz"
    mode: "0644"
  when: not _ew_installed.stat.exists

- name: Extract Element Web tarball
  ansible.builtin.unarchive:
    src: "{{ _ew_tmp.path }}/element-web.tar.gz"
    dest: "{{ _ew_tmp.path }}"
    remote_src: true
  when: not _ew_installed.stat.exists

- name: Install Element Web static files
  ansible.builtin.copy:
    src: "{{ _ew_tmp.path }}/element-{{ _ew_release.json.tag_name }}/"
    dest: "{{ element_web_install_dir }}/"
    owner: root
    group: www-data
    mode: "0644"
    directory_mode: "0755"
    remote_src: true
  when: not _ew_installed.stat.exists

- name: Remove Element Web download workspace
  ansible.builtin.file:
    path: "{{ _ew_tmp.path }}"
    state: absent
  when: not _ew_installed.stat.exists and _ew_tmp.path is defined

- name: Deploy Element Web config.json
  ansible.builtin.template:
    src: element-web-config.json.j2
    dest: "{{ element_web_install_dir }}/config.json"
    owner: root
    group: www-data
    mode: "0644"
  notify: Reload nginx
