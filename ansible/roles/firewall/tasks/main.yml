---
# roles/firewall/tasks/main.yml
# Deploy nftables firewall rules that enforce the CafeBox threat model:
#   - No WAN routing/NAT for connected clients.
#   - Allow DHCP (UDP 67/68), DNS (UDP/TCP 53), HTTP (TCP 80) on the AP
#     interface only.
#   - Drop everything else from clients.
#   - Allow full outbound from the box itself for build-time downloads.

- name: "Firewall — install and configure nftables"
  block:
    - name: Install nftables package
      ansible.builtin.apt:
        name: nftables
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Deploy rendered nftables configuration
      ansible.builtin.template:
        src: nftables.conf.j2
        dest: "{{ firewall_nftables_conf }}"
        owner: root
        group: root
        mode: "0640"
      notify: Reload nftables

    - name: Apply nftables rules immediately from the deployed config
      # This guarantees the active kernel rules always match /etc/nftables.conf
      # even when the template content hasn't changed (which would skip the
      # handler-based service restart).  Using nft -f directly is idempotent
      # because the config starts with `flush ruleset`.
      # Skipped during image build (nspawn container lacks CAP_NET_ADMIN);
      # on boot the nftables service (enabled below) loads the rules instead.
      ansible.builtin.command:
        cmd: "nft -f {{ firewall_nftables_conf }}"
      changed_when: false
      when: _systemd_active.stat.exists

    - name: Enable nftables service so rules load on every boot
      ansible.builtin.service:
        name: nftables
        enabled: true

    - name: Start nftables service (live system only)
      ansible.builtin.service:
        name: nftables
        state: started
      when: _systemd_active.stat.exists

  rescue:
    - name: "Firewall FAILED — nftables installation or configuration error"
      ansible.builtin.fail:
        msg: >-
          Firewall role failed.
          Check the task output above for details.
