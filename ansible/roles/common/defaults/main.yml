---
# roles/common/defaults/main.yml
cafebox_user:  "cafebox"
cafebox_group: "cafebox"

cafebox_storage_base: "/srv/cafebox"

# Directory on the target machine where project files are deployed by Ansible
cafebox_app_dir: "/opt/cafebox"

# Full paths of per-service storage directories, derived from storage.locations
# in group_vars/all.yml (which mirrors cafe.yaml: storage.locations.*).
# Do NOT edit this list directly — add/remove entries in cafe.yaml instead.
cafebox_storage_dirs: "{{ storage.locations.values() | list }}"

# Base packages installed on every CafeBox host
cafebox_base_packages:
  - curl
  - git
  - vim
  - htop
  - ca-certificates
  - rsync
  - logrotate
  - systemd-timesyncd
  - openssh-server
  - python3-packaging
  - python3-venv

# ---------------------------------------------------------------------------
# USB OTG SSH — cable-based admin access for debugging without WiFi
# ---------------------------------------------------------------------------
# These defaults mirror cafe.yaml: usb_ssh.* and are used as a fallback when
# group_vars/all.yml (which mirrors cafe.yaml) does not define usb_ssh.
usb_ssh:
  enabled: true
  username: "cafe"
  password: "cafe"
  ip: "192.168.7.2"
