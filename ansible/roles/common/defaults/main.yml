---
# roles/common/defaults/main.yml
hearth_user:  "hearth"
hearth_group: "hearth"

hearth_storage_base: "/srv/hearth"

# Directory on the target machine where project files are deployed by Ansible
hearth_app_dir: "/opt/hearth"

# Full paths of per-service storage directories, derived from storage.locations
# in group_vars/all.yml (which mirrors hearth.yaml: storage.locations.*).
# Do NOT edit this list directly — add/remove entries in hearth.yaml instead.
hearth_storage_dirs: "{{ storage.locations.values() | list }}"

# Base packages installed on every Hearth host
hearth_base_packages:
  - curl
  - git
  - vim
  - htop
  - ca-certificates
  - rsync
  - logrotate
  - systemd-timesyncd
  - openssh-server
  - python3-packaging
  - python3-venv
  # python3-pam enables PAM-based password verification in the admin backend;
  # without it the backend falls back to spwd/crypt (requires shadow group).
  - python3-pam
  # avahi-daemon announces the box hostname as <name>.local via mDNS so that
  # clients using systemd-resolved (Ubuntu, modern Debian) can resolve the
  # domain without relying on the DHCP-provided dnsmasq DNS server.  Ubuntu's
  # nsswitch.conf routes .local queries through mDNS (mdns4_minimal
  # [NOTFOUND=return]) — without avahi the domain is simply unresolvable on
  # those clients regardless of what dnsmasq serves.
  - avahi-daemon

# ---------------------------------------------------------------------------
# USB OTG SSH — cable-based admin access for debugging without WiFi
# ---------------------------------------------------------------------------
# These defaults mirror hearth.yaml: usb_ssh.* and are used as a fallback when
# group_vars/all.yml (which mirrors hearth.yaml) does not define usb_ssh.
usb_ssh:
  enabled: true
  username: "cafe"
  password: "cafe"
  ip: "192.168.7.2"
