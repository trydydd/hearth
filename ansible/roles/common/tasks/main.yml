---
# roles/common/tasks/main.yml
# Bootstrap the CafeBox host in four clearly separated phases:
#   1. Package installation
#   2. User and directory setup
#   3. Config generation
#   4. Service enablement
#
# Each phase is wrapped in a block/rescue so any failure stops the play
# immediately with a descriptive message.

# ---------------------------------------------------------------------------
# Hardware detection — log whether we are on real Pi hardware or a VM
# ---------------------------------------------------------------------------
- name: Detect hardware platform
  ansible.builtin.slurp:
    src: /proc/device-tree/model
  register: _dt_model
  failed_when: false

- name: Log hardware platform
  ansible.builtin.debug:
    msg: >-
      {{
        'Running on Raspberry Pi hardware: ' ~ (_dt_model.content | b64decode | trim)
        if _dt_model.content is defined
        else 'Running in VM / non-Pi environment'
      }}

# ---------------------------------------------------------------------------
# Phase 1 — Package installation
# ---------------------------------------------------------------------------
- name: "Phase 1 — Install base system packages"
  block:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name: "{{ cafebox_base_packages }}"
        state: present

  rescue:
    - name: "Phase 1 FAILED — package installation error"
      ansible.builtin.fail:
        msg: >-
          Common role phase 1 (package installation) failed.
          Check the apt output above for details.

# ---------------------------------------------------------------------------
# Phase 2 — User and directory setup
# ---------------------------------------------------------------------------
- name: "Phase 2 — Create system user and directory layout"
  block:
    - name: Create cafebox system group
      ansible.builtin.group:
        name: "{{ cafebox_group }}"
        system: true
        state: present

    - name: Create cafebox system user
      ansible.builtin.user:
        name: "{{ cafebox_user }}"
        group: "{{ cafebox_group }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ cafebox_storage_base }}"
        create_home: false
        state: present

    - name: Create storage base directory
      ansible.builtin.file:
        path: "{{ cafebox_storage_base }}"
        state: directory
        owner: "{{ cafebox_user }}"
        group: "{{ cafebox_group }}"
        mode: "0755"

    - name: Create per-service storage subdirectories
      ansible.builtin.file:
        path: "{{ cafebox_storage_base }}/{{ item }}"
        state: directory
        owner: "{{ cafebox_user }}"
        group: "{{ cafebox_group }}"
        mode: "0755"
      loop: "{{ cafebox_storage_dirs }}"

    - name: Create /run/cafebox directory (tmpfiles.d)
      ansible.builtin.copy:
        dest: /etc/tmpfiles.d/cafebox.conf
        content: "d /run/cafebox 0750 {{ cafebox_user }} {{ cafebox_group }} -\n"
        owner: root
        group: root
        mode: "0644"

    - name: Create /var/lib/cafebox state directory
      ansible.builtin.file:
        path: /var/lib/cafebox
        state: directory
        owner: "{{ cafebox_user }}"
        group: "{{ cafebox_group }}"
        mode: "0750"

    - name: Create app directory for deployed project files
      ansible.builtin.file:
        path: "{{ cafebox_app_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

  rescue:
    - name: "Phase 2 FAILED — user/directory setup error"
      ansible.builtin.fail:
        msg: >-
          Common role phase 2 (user and directory setup) failed.
          Check the task output above for details.

# ---------------------------------------------------------------------------
# Phase 3 — Config generation
# ---------------------------------------------------------------------------
- name: "Phase 3 — Generate system configurations from cafe.yaml"
  block:
    - name: Install Python3 and pip (required for generate-configs.py)
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-jinja2
          - python3-yaml
        state: present

    - name: Deploy cafe.yaml to app directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../cafe.yaml"
        dest: "{{ cafebox_app_dir }}/cafe.yaml"
        owner: root
        group: root
        mode: "0644"

    - name: Deploy scripts to app directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/"
        dest: "{{ cafebox_app_dir }}/scripts/"
        owner: root
        group: root
        mode: "0755"

    - name: Deploy system templates to app directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../system/templates/"
        dest: "{{ cafebox_app_dir }}/system/templates/"
        owner: root
        group: root
        mode: "0644"

    - name: Run generate-configs.py to render Jinja2 templates
      ansible.builtin.command:
        cmd: "python3 {{ cafebox_app_dir }}/scripts/generate-configs.py --config {{ cafebox_app_dir }}/cafe.yaml"
        chdir: "{{ cafebox_app_dir }}"
      register: _generate_configs
      changed_when: "'Written:' in _generate_configs.stdout"

    - name: Show generate-configs.py output
      ansible.builtin.debug:
        var: _generate_configs.stdout_lines

  rescue:
    - name: "Phase 3 FAILED — config generation error"
      ansible.builtin.fail:
        msg: >-
          Common role phase 3 (config generation) failed.
          Check the generate-configs.py output above for details.

# ---------------------------------------------------------------------------
# Phase 4 — Service enablement
# ---------------------------------------------------------------------------
- name: "Phase 4 — Enable and start core systemd services"
  block:
    - name: Apply tmpfiles.d configuration to create /run/cafebox immediately
      ansible.builtin.command:
        cmd: systemd-tmpfiles --create /etc/tmpfiles.d/cafebox.conf
      changed_when: false

  rescue:
    - name: "Phase 4 FAILED — service enablement error"
      ansible.builtin.fail:
        msg: >-
          Common role phase 4 (service enablement) failed.
          Check the systemd output above for details.
