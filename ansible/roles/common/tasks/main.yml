---
# roles/common/tasks/main.yml
# Bootstrap the CafeBox host in three clearly separated phases:
#   1. Package installation
#   2. User and directory setup
#   3. Service enablement
#
# Each phase is wrapped in a block/rescue so any failure stops the play
# immediately with a descriptive message.

# ---------------------------------------------------------------------------
# Hardware detection — log whether we are on real Pi hardware or a VM
# ---------------------------------------------------------------------------
- name: Detect hardware platform
  ansible.builtin.slurp:
    src: /proc/device-tree/model
  register: _dt_model
  failed_when: false

- name: Log hardware platform
  ansible.builtin.debug:
    msg: >-
      {{
        'Running on Raspberry Pi hardware: ' ~ (_dt_model.content | b64decode | trim)
        if _dt_model.content is defined
        else 'Running in VM / non-Pi environment'
      }}

# ---------------------------------------------------------------------------
# Phase 1 — Package installation
# ---------------------------------------------------------------------------
- name: "Phase 1 — Install base system packages"
  block:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name: "{{ cafebox_base_packages }}"
        state: present

  rescue:
    - name: "Phase 1 FAILED — package installation error"
      ansible.builtin.fail:
        msg: >-
          Common role phase 1 (package installation) failed.
          Check the apt output above for details.

# ---------------------------------------------------------------------------
# Phase 2 — User and directory setup
# ---------------------------------------------------------------------------
- name: "Phase 2 — Create system user and directory layout"
  block:
    - name: Create cafebox system group
      ansible.builtin.group:
        name: "{{ cafebox_group }}"
        system: true
        state: present

    - name: Create cafebox system user
      ansible.builtin.user:
        name: "{{ cafebox_user }}"
        group: "{{ cafebox_group }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ cafebox_storage_base }}"
        create_home: false
        state: present

    - name: Create cafebox-admin system group
      ansible.builtin.group:
        name: cafebox-admin
        system: true
        state: present

    - name: Create cafebox-admin system user (admin backend process user)
      ansible.builtin.user:
        name: cafebox-admin
        group: cafebox-admin
        system: true
        shell: /usr/sbin/nologin
        create_home: false
        password_lock: true
        state: present

    - name: Create storage base directory
      ansible.builtin.file:
        path: "{{ cafebox_storage_base }}"
        state: directory
        owner: "{{ cafebox_user }}"
        group: "{{ cafebox_group }}"
        mode: "0755"

    - name: Create per-service storage subdirectories
      # Iterates over the full paths from storage.locations (via cafebox_storage_dirs).
      # Directories are owned by the cafebox system user.
      # Convention: if a service role runs under a different dedicated user it must
      # chown its own subdirectory inside that role's tasks — not here.
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ cafebox_user }}"
        group: "{{ cafebox_group }}"
        mode: "0755"
      loop: "{{ cafebox_storage_dirs }}"

    - name: Create /run/cafebox directory (tmpfiles.d)
      ansible.builtin.copy:
        dest: /etc/tmpfiles.d/cafebox.conf
        content: "d /run/cafebox 0755 {{ cafebox_user }} {{ cafebox_group }} -\n"
        owner: root
        group: root
        mode: "0644"

    - name: Create /var/lib/cafebox state directory
      ansible.builtin.file:
        path: /var/lib/cafebox
        state: directory
        owner: "{{ cafebox_user }}"
        group: "{{ cafebox_group }}"
        mode: "0750"

  rescue:
    - name: "Phase 2 FAILED — user/directory setup error"
      ansible.builtin.fail:
        msg: >-
          Common role phase 2 (user and directory setup) failed.
          Check the task output above for details.

# ---------------------------------------------------------------------------
# Phase 3 — Service enablement
# ---------------------------------------------------------------------------
- name: "Phase 3 — Enable and start core systemd services"
  block:
    - name: Apply tmpfiles.d configuration to create /run/cafebox immediately
      ansible.builtin.command:
        cmd: systemd-tmpfiles --create /etc/tmpfiles.d/cafebox.conf
      changed_when: false

  rescue:
    - name: "Phase 3 FAILED — service enablement error"
      ansible.builtin.fail:
        msg: >-
          Common role phase 3 (service enablement) failed.
          Check the systemd output above for details.

# ---------------------------------------------------------------------------
# Phase 4 — First-boot credential generator
# ---------------------------------------------------------------------------
- name: "Phase 4 — Deploy and enable first-boot credential generator"
  block:
    - name: Detect whether systemd is active (not a chroot)
      # /run/systemd/private is only created when systemd is actually running
      # as PID 1.  /run/systemd/system exists in systemd-nspawn containers
      # even without --boot (where there is no running daemon), so it is NOT
      # a reliable indicator of a live system.
      ansible.builtin.stat:
        path: /run/systemd/private
      register: _systemd_active

    - name: Deploy first-boot script
      ansible.builtin.copy:
        src: first-boot.sh
        dest: /usr/local/sbin/cafebox-first-boot.sh
        owner: root
        group: root
        mode: "0700"

    - name: Deploy first-boot systemd unit
      ansible.builtin.copy:
        src: first-boot.service
        dest: /etc/systemd/system/cafebox-first-boot.service
        owner: root
        group: root
        mode: "0644"

    - name: Enable first-boot service (symlink — works in chroot and on live systems)
      ansible.builtin.file:
        src: /etc/systemd/system/cafebox-first-boot.service
        dest: /etc/systemd/system/multi-user.target.wants/cafebox-first-boot.service
        state: link

    - name: Reload systemd daemon and start first-boot service (live system only)
      ansible.builtin.systemd:
        name: cafebox-first-boot.service
        state: started
        daemon_reload: true
      when: _systemd_active.stat.exists

  rescue:
    - name: "Phase 4 FAILED — first-boot setup error"
      ansible.builtin.fail:
        msg: >-
          Common role phase 4 (first-boot credential generator) failed.
          Check the task output above for details.

# ---------------------------------------------------------------------------
# Phase 5 — SSH over USB-OTG (cable access for debugging without WiFi)
# ---------------------------------------------------------------------------
# Configures the Pi as a USB Ethernet gadget so an operator can SSH in over a
# USB cable when the WiFi AP is not broadcasting.  Works on Pi Zero 2 W (and
# any other Pi with a USB OTG port) running Raspberry Pi OS Bookworm or later.
#
# Controlled by usb_ssh.enabled (cafe.yaml: usb_ssh.enabled, default true).
# Set usb_ssh.enabled: false in cafe.yaml to skip this entire phase.
#
# What this phase does:
#   1. Creates an OS user (usb_ssh.username / usb_ssh.password) so the
#      operator has a known account to SSH into.
#   2. Writes userconf.txt to the boot partition so the user is created on
#      first boot even before Ansible runs (RPi OS convention since Bookworm).
#   3. Adds 'dtoverlay=dwc2' to /boot/firmware/config.txt (or /boot/config.txt
#      on older images) to enable the USB OTG gadget controller.
#   4. Appends 'modules-load=dwc2,g_ether' to cmdline.txt so the kernel loads
#      the USB Ethernet gadget driver on every boot.
#   5. Creates an empty 'ssh' file in the boot partition — Raspberry Pi OS
#      checks for this on first boot and enables the SSH daemon permanently.
#   6. Configures a static IP (usb_ssh.ip, default 192.168.7.2) on the usb0
#      gadget interface via dhcpcd.conf (present on RPi OS Lite).
#   7. Enables the openssh-server (ssh) service.
#
# Tasks 3–6 are skipped automatically when neither boot config path exists
# (e.g. in the Vagrant development VM), so the playbook is safe to run in
# both environments.

- name: "Phase 5 — Enable SSH over USB-OTG"
  when: usb_ssh.enabled | default(true)
  block:
    # ---- Detect boot partition path ----------------------------------------
    # RPi OS Bookworm and later (including Trixie) places boot files at
    # /boot/firmware/; older images use /boot/ directly.
    - name: Detect modern boot config (/boot/firmware/config.txt)
      ansible.builtin.stat:
        path: /boot/firmware/config.txt
      register: _boot_firmware_cfg

    - name: Detect legacy boot config (/boot/config.txt)
      ansible.builtin.stat:
        path: /boot/config.txt
      register: _boot_legacy_cfg

    - name: Set boot directory fact
      ansible.builtin.set_fact:
        _boot_dir: "{{ '/boot/firmware' if _boot_firmware_cfg.stat.exists else '/boot' }}"

    # ---- Create USB SSH OS user --------------------------------------------
    # Creates (or ensures) the operator account used to log in over USB cable.
    # update_password: on_create preserves any password the operator has
    # already changed since first provisioning.
    - name: Create USB SSH operator user
      ansible.builtin.user:
        name: "{{ usb_ssh.username }}"
        password: "{{ usb_ssh.password | password_hash('sha512') }}"
        shell: /bin/bash
        create_home: true
        state: present
        update_password: on_create
      no_log: true

    - name: Grant USB SSH user sudo access
      ansible.builtin.user:
        name: "{{ usb_ssh.username }}"
        groups: sudo
        append: true

    # ---- Write userconf.txt for RPi OS first-boot user creation ------------
    # RPi OS reads userconf.txt from the boot partition on first boot
    # (convention since Bookworm, continues in Trixie and later) and creates
    # the user before any other service starts, ensuring the SSH account exists
    # even before this playbook has a chance to run.
    - name: Write userconf.txt for Raspberry Pi OS first-boot user creation
      ansible.builtin.copy:
        content: "{{ usb_ssh.username }}:{{ usb_ssh.password | password_hash('sha512') }}\n"
        dest: "{{ _boot_dir }}/userconf.txt"
        owner: root
        group: root
        mode: "0600"
      when: _boot_firmware_cfg.stat.exists or _boot_legacy_cfg.stat.exists
      no_log: true

    # ---- Modify boot files (skip on VMs where neither path exists) ----------
    - name: Configure USB OTG gadget mode (Pi hardware only)
      when: _boot_firmware_cfg.stat.exists or _boot_legacy_cfg.stat.exists
      block:
        # The stock RPi OS config.txt already contains `dtoverlay=dwc2` in
        # the `[cm5]` conditional section.  A plain lineinfile with a regexp
        # would match that entry and leave it in [cm5], meaning the overlay
        # never loads on Pi Zero 2 W (or any non-CM5 board).  We therefore
        # check explicitly whether the line already appears in the [all]
        # section before inserting it there.
        # Note: {{ _boot_dir }} is outside the awk single-quoted program —
        # it is the file argument and is expanded by Jinja2 before the shell
        # module executes the command.
        - name: Check if dtoverlay=dwc2 is present in [all] section of config.txt
          ansible.builtin.shell:
            cmd: >-
              awk '/^\[all\]/{in_all=1; next} /^\[/{in_all=0}
                   in_all && /^dtoverlay=dwc2($|[[:space:],])/{exit 0} END{exit 1}'
              "{{ _boot_dir }}/config.txt"
          register: _dwc2_in_all
          changed_when: false
          failed_when: false

        - name: Enable USB OTG dwc2 overlay in [all] section of boot config
          ansible.builtin.lineinfile:
            path: "{{ _boot_dir }}/config.txt"
            line: "dtoverlay=dwc2"
            insertafter: "^\\[all\\]"
          when: _dwc2_in_all.rc != 0

        - name: Read current kernel cmdline
          ansible.builtin.slurp:
            src: "{{ _boot_dir }}/cmdline.txt"
          register: _cmdline_raw

        - name: Enable g_ether USB OTG module in kernel cmdline
          # cmdline.txt is a single space-separated line; append the
          # modules-load token only if it is not already present.
          ansible.builtin.copy:
            content: "{{ (_cmdline_raw.content | b64decode | trim) ~ ' modules-load=dwc2,g_ether' }}\n"
            dest: "{{ _boot_dir }}/cmdline.txt"
            owner: root
            group: root
            mode: "0644"
          when: "'modules-load=dwc2,g_ether' not in (_cmdline_raw.content | b64decode)"

        - name: Create ssh enable file in boot partition
          # RPi OS reads this file at first boot and enables the SSH daemon.
          ansible.builtin.file:
            path: "{{ _boot_dir }}/ssh"
            state: touch
            owner: root
            group: root
            mode: "0644"
          changed_when: false

    # ---- Static IP for usb0 via dhcpcd (RPi OS default network manager) ----
    - name: Check for dhcpcd.conf (present on RPi OS, absent in Vagrant VMs)
      ansible.builtin.stat:
        path: /etc/dhcpcd.conf
      register: _dhcpcd_conf

    - name: Configure static IP for usb0 in dhcpcd.conf
      # Gives the USB gadget interface a predictable IP so operators can
      # connect with: ssh {{ usb_ssh.username }}@{{ usb_ssh.ip }}
      ansible.builtin.blockinfile:
        path: /etc/dhcpcd.conf
        block: |
          interface usb0
          static ip_address={{ usb_ssh.ip }}/24
        marker: "# {mark} ANSIBLE MANAGED BLOCK — cafebox usb0"
      when: _dhcpcd_conf.stat.exists

    # ---- Static IP for usb0 via NetworkManager (RPi OS Trixie and later) ----
    # On RPi OS Trixie and newer Debian-based systems, NetworkManager is the
    # default network manager and dhcpcd.conf may not be processed.  A NM
    # keyfile connection ensures usb0 gets the static IP even when dhcpcd is
    # not running.  The keyfile is ignored on systems that don't use NM.
    - name: Check if NetworkManager is installed (for usb0 NM keyfile)
      ansible.builtin.stat:
        path: /etc/NetworkManager
      register: _nm_dir_common

    - name: Create NM system-connections directory if needed
      ansible.builtin.file:
        path: /etc/NetworkManager/system-connections
        state: directory
        owner: root
        group: root
        mode: "0700"
      when: _nm_dir_common.stat.exists

    - name: Deploy NM keyfile connection for usb0 static IP
      # NM keyfiles must be mode 0600; NM refuses to load less-restrictive files.
      # The UUID is generated deterministically from the connection name so it
      # does not change between provisioning runs.
      ansible.builtin.copy:
        dest: /etc/NetworkManager/system-connections/cafebox-usb0.nmconnection
        content: |
          # Managed by Ansible (CafeBox common role)
          # Static IP for the USB OTG gadget ethernet interface.
          [connection]
          id=cafebox-usb0
          uuid={{ 'cafebox-usb0' | to_uuid }}
          type=ethernet
          interface-name=usb0
          autoconnect=yes
          autoconnect-retries=-1

          [ethernet]

          [ipv4]
          method=manual
          addresses={{ usb_ssh.ip }}/24
          never-default=true

          [ipv6]
          method=disabled
        owner: root
        group: root
        mode: "0600"
      when: _nm_dir_common.stat.exists

    # ---- Ensure the SSH service is enabled ---------------------------------
    - name: Enable SSH service
      ansible.builtin.systemd:
        name: ssh
        enabled: true
        masked: false

  rescue:
    - name: "Phase 5 FAILED — USB OTG SSH setup error"
      ansible.builtin.fail:
        msg: >-
          Common role phase 5 (USB OTG SSH) failed.
          Check the task output above for details.

