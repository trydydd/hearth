---
# ansible/inventory.yml — Vagrant-managed inventory for CafeBox dev VM
#
# Vagrant injects its own SSH connection details at runtime, so the
# connection parameters here are defaults used when running ansible-playbook
# directly (i.e. outside of `vagrant provision`).

all:
  hosts:
    cafebox-dev:
      ansible_host: 127.0.0.1
      ansible_port: 2222
      ansible_user: vagrant
      ansible_ssh_private_key_file: .vagrant/machines/default/virtualbox/private_key
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
