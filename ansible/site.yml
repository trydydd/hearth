---
# site.yml — Hearth top-level playbook
#
# Apply all roles to the hearth host group.
# Run against the dev VM:   ansible-playbook -i inventory/development site.yml
# Run against real Pi:      ansible-playbook -i inventory/production  site.yml

- name: Provision Hearth
  hosts: all
  become: true

  vars_files:
    - ../hearth.yaml

  pre_tasks:
    - name: Smoke test — verify playbook execution reaches the host
      ansible.builtin.file:
        path: /tmp/ansible_ok
        state: touch
        mode: "0644"

  roles:
    - role: common
      tags: [common]
    - role: wifi
      tags: [wifi]
    - role: firewall
      tags: [firewall]
    - role: nginx
      tags: [nginx]
    - role: chat
      tags: [chat]
    - role: calibre_web
      tags: [calibre_web]
    - role: kiwix
      tags: [kiwix]
    - role: jukebox
      tags: [jukebox]
    - role: admin
      tags: [admin]
    - role: diagnostics
      tags: [diagnostics]