# .github/workflows/build-image.yml — Build and publish a CafeBox flashable image
#
# Triggers on every version tag push (e.g. v1.0.0).
# Runs scripts/build-image.sh on a native ARM64 runner so no QEMU emulation is
# needed, then attaches the compressed image to the GitHub Release.
#
# Runner: ubuntu-24.04-arm (GitHub-hosted ARM64, 4-core, 16 GB RAM)
#
# Cost (private repositories only — public repos are FREE):
#   GitHub's ubuntu-24.04-arm runner is billed at $0.016 / minute.
#   A full build takes roughly 10–30 minutes, so:
#     Minimum: ~$0.16 per build  (fast network + light provisioning)
#     Typical: ~$0.24–$0.48 per build
#   Public repositories: $0 — GitHub Actions minutes are free for public repos.
#   See https://docs.github.com/en/billing/managing-billing-for-your-products/
#       managing-billing-for-github-actions/about-billing-for-github-actions

name: Build Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      mode:
        description: >
          Build mode:
            dry-run  — verify workflow steps without building (fast, free)
            artifact — full ARM64 build, image uploaded as a downloadable
                       workflow artifact (no GitHub Release created)
            release  — full ARM64 build + GitHub Release (same as a tag push)
        required: false
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - artifact
          - release

jobs:
  build-image:
    name: Build flashable .img.xz
    runs-on: ubuntu-24.04-arm  # native ARM64 — no QEMU emulation required

    permissions:
      contents: write  # required to create a release and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ansible \
            e2fsprogs \
            kpartx \
            parted \
            rsync \
            systemd-container \
            util-linux \
            wget \
            xz-utils

      - name: Build flashable image
        run: |
          if [ "${{ inputs.mode }}" = "dry-run" ]; then
            echo "[dry-run] Skipping image build — verifying build script syntax only"
            bash -n scripts/build-image.sh
          else
            sudo scripts/build-image.sh
          fi

      - name: Upload image as workflow artifact
        if: ${{ inputs.mode == 'artifact' }}
        uses: actions/upload-artifact@v6
        with:
          name: cafebox-image
          path: image/cafebox.img.xz
          retention-days: 7

      - name: Create GitHub Release and upload image
        if: ${{ github.event_name == 'push' || (inputs.mode == 'release' && github.ref_name == 'main') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            # Release already exists (e.g. created manually) — just attach the asset
            gh release upload "${{ github.ref_name }}" image/cafebox.img.xz --clobber
          else
            # First publish: create the release and attach the asset in one step
            gh release create "${{ github.ref_name }}" \
              --title "CafeBox ${{ github.ref_name }}" \
              --generate-notes \
              image/cafebox.img.xz
          fi
