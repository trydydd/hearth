# cafe.yaml — CafeBox operator configuration
# This is the only file you need to edit to customise your CafeBox.
# All system configs (nginx, hostapd, dnsmasq, etc.) are auto-generated from here.

# ---------------------------------------------------------------------------
# Box identity
# ---------------------------------------------------------------------------
box:
  # Human-readable name shown on the landing portal and in admin UI
  name: "CafeBox"

  # Domain used for all local services (resolved inside the hotspot only)
  domain: "cafe.box"

  # IP address assigned to the box's AP interface
  ip: "10.0.0.1"

# ---------------------------------------------------------------------------
# WiFi hotspot (hostapd + dnsmasq)
# ---------------------------------------------------------------------------
wifi:
  # SSID broadcast by the hotspot
  ssid: "CafeBox"

  # WPA2 passphrase — set to an empty string for an open network
  passphrase: ""

  # Wireless interface used for the access point
  interface: "wlan0"

  # 802.11 channel (1–11 for 2.4 GHz; leave at 6 for best compatibility)
  channel: 6

  # ISO 3166-1 alpha-2 country code for the regulatory domain.
  # Required for the Pi Zero 2 W (BCM43430) to transmit on most channels.
  # Without this the radio defaults to the world domain (00) which may
  # restrict available channels and prevent hostapd from starting.
  # Examples: GB, US, DE, FR, AU. Leave empty only if deliberately unset.
  country_code: "GB"

  # DHCP range handed to connected clients (start, end, lease time)
  dhcp_range_start: "10.0.0.10"
  dhcp_range_end: "10.0.0.200"
  dhcp_lease: "12h"

# ---------------------------------------------------------------------------
# Storage paths
#
# All writable service data lives under a single top-level base directory.
# This makes the entire data tree easy to back up (rsync <base>/ captures
# everything) and straightforward to migrate to external media.
#
# To move data to a USB drive or external SSD:
#   Option A — mount first, then provision:
#     Mount the drive at the current base path (e.g. /srv/cafebox) before
#     running ansible-playbook. Ansible creates the subdirectories on the
#     mounted drive automatically.
#   Option B — update base, then re-provision:
#     Change storage.base (and each storage.locations entry) to the new
#     mount point (e.g. /mnt/cafebox-data) and re-run ansible-playbook.
#     All directories are recreated and service configs are re-rendered.
# ---------------------------------------------------------------------------
storage:
  # Top-level base directory. Mount an external drive here before provisioning
  # (Option A above) or update this value and re-provision (Option B).
  base: "/srv/cafebox"

  locations:
    calibre_web:  "/srv/cafebox/calibre"
    kiwix:        "/srv/cafebox/kiwix"
    navidrome:    "/srv/cafebox/navidrome"

# ---------------------------------------------------------------------------
# USB SSH — cable-based operator access via USB OTG (Pi Zero / Zero 2 W)
#
# When enabled, every image will:
#   • configure the USB OTG gadget Ethernet driver (dwc2 + g_ether)
#   • create an OS user with the username/password below (default: cafe/cafe)
#   • write userconf.txt to the boot partition so the user exists on first boot
#   • assign a static IP to the usb0 interface
#   • enable the SSH daemon
#
# Connect after flashing:
#   ssh <username>@<ip>   (plug a data USB cable into the Pi's USB port, wait ~30 s)
#
# SECURITY: change username and password before deploying to shared environments.
# ---------------------------------------------------------------------------
usb_ssh:
  # Set to false to skip all USB gadget and SSH user provisioning
  enabled: false

  # OS user created for USB SSH access
  username: "cafe"

  # Default password — change before deploying to a shared or public environment.
  # Anyone on the same USB network segment can attempt to log in with these
  # credentials, so using the default in production is a security risk.
  password: "cafe"

  # Static IP assigned to the usb0 gadget interface
  ip: "192.168.7.2"

# ---------------------------------------------------------------------------
# Services — per-service enable flags
# Set a service to false to prevent it from being installed/started.
# ---------------------------------------------------------------------------
services:
  # Hearth Chat — ephemeral anonymous chat.
  # Messages are stored in an encrypted volume whose key is generated at boot
  # and never written to disk. All messages are permanently deleted when the
  # box restarts or powers off.
  chat:
    enabled: true

  # eBook library (Calibre-Web)
  calibre_web:
    enabled: true

  # Offline Wikipedia / ZIM reader (Kiwix)
  kiwix:
    enabled: true

  # Music streaming server (Navidrome)
  navidrome:
    enabled: true

# ---------------------------------------------------------------------------
# Diagnostics
#
# Controls the boot-partition diagnostic report that runs on every boot.
# The report is written to the FAT32 boot partition so it can be read by
# pulling the SD card — no SSH, WiFi, or USB-OTG access required.
#
# Output file: /boot/firmware/cafebox-diagnostics.log
# ---------------------------------------------------------------------------
diagnostics:
  # When true, passwords and passphrases are replaced with <REDACTED> in the
  # boot-partition diagnostic log.  Set to true before distributing images to
  # others; leave false during development so you can see actual config values.
  redact_secrets: false
